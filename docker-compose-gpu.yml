version: '3.8'

services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "5000:5000"
    env_file:
      - py.env
    volumes:
      - .:/app
      - ./recordings:/app/recordings
      - ./clips:/app/clips
      - ./dataset_wajah.pkl:/app/dataset_wajah.pkl
    runtime: nvidia 
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    networks:
      - va-network
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined

networks:
  va-network:
    driver: bridge